name: Temettu Guncelle

on:
  schedule:
  - cron: '0 19 * * 1-5'   # Haftaiçi (Pzt-Cum) 19:00 UTC = 22:00 TR
  workflow_dispatch:         # Elle de tetiklenebilir

jobs:
  cek:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bagimliliklari kur
        run: |
          pip install playwright pandas
          playwright install chromium
          playwright install-deps chromium

      - name: Veriyi cek
        run: python temettu_async.py

      - name: JSON'u commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add temettu_verileri.json
          git commit -m "Temettu guncellendi $(date +'%Y-%m-%d')" || echo "Degisiklik yok"
          git push
